# kstoolchain adapters overlay — example
#
# `kstoolchain init` can author or repair this file for you. If you edit it
# manually, keep it thin: only local repo_id -> repo_path mappings belong here.
#
# Runtime selection:
#
#   kstoolchain status --adapters ~/.keystone/toolchain/adapters.yaml
#   kstoolchain sync --adapters ~/.keystone/toolchain/adapters.yaml
#   kstoolchain init --adapters ~/.keystone/toolchain/adapters.yaml
#
# The overlay is thin on purpose:
# - tracked adapter metadata stays in the embedded manifest
# - this file owns only repo_id -> repo_path

schema: kstoolchain.adapter-overlay/v1alpha1
repos:
  - repo_id: keystone-hub
    repo_path: ~/git/keystone-hub

  - repo_id: keystone-memory
    repo_path: ~/git/keystone-memory
