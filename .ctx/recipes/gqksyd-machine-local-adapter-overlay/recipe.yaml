recipe_id: gqksyd-machine-local-adapter-overlay
task_kind: investigation
objective: Review the machine-local adapter-path contract for kstoolchain and prepare deterministic context for external review.
constraints:
  - Keep the slice narrow to machine-local adapter path ownership, runtime precedence, init discovery and verification flow, and setup-blocked sync behavior.
  - Treat tracked adapter metadata as shared repo truth and machine-local repo paths as runtime-local state.
  - Do not widen the slice into general sync/status rendering or post-install bootstrap hooks.
